name: Deploy Enora lifestyle via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: | 
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
          echo "VITE_IMAGE_BASE_URL=${{ secrets.VITE_IMAGE_BASE_URL }}" >> .env
          echo "VITE_ACCCOUNT_NUMBER=${{ secrets.VITE_ACCCOUNT_NUMBER }}" >> .env
          echo "VITE_ACCCOUNT_NAME=${{ secrets.VITE_ACCCOUNT_NAME }}" >> .env
          echo "VITE_BANK_NAME=${{ secrets.VITE_BANK_NAME }}" >> .env
          npm run build
          
      - name: Deploy to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_TARGET }}
